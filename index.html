<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SLAY AI - AI-powered fashion curation for the modern aesthetic. Get personalized outfit lookbooks from Myntra, Ajio and Meesho." />
    <meta name="keywords" content="AI styling, AI fashion stylist, outfit generator, SLAY AI, Myntra outfits, Ajio style, Meesho haul, generative fashion AI, AI lookbook" />
    <meta name="author" content="SLAY AI" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://slay-ai.app/" />
    <meta property="og:title" content="SLAY AI - Your Elite AI Fashion Stylist" />
    <meta property="og:description" content="Hyper-personalized outfit lookbooks curated in seconds by AI. Get premium styles from Myntra, Ajio, and Meesho tailored to your budget." />
    <meta property="og:image" content="https://slay-ai.app/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://slay-ai.app/" />
    <meta property="twitter:title" content="SLAY AI - Your Elite AI Fashion Stylist" />
    <meta property="twitter:description" content="Hyper-personalized outfit lookbooks curated in seconds by AI. Get premium styles from Myntra, Ajio, and Meesho tailored to your budget." />
    <meta property="twitter:image" content="https://slay-ai.app/og-image.jpg" />
    
    <link rel="canonical" href="https://slay-ai.app/" />
    <title>SLAY AI - Curate Your Look with AI</title>

    <!-- JSON-LD Structured Data for AEO/GEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SLAY AI",
      "operatingSystem": "WebBrowser",
      "applicationCategory": "LifestyleApplication",
      "description": "AI-powered fashion stylist and outfit curation tool generating hyper-personalized lookbooks from Myntra, Ajio, and Meesho based on user age, gender, budget, and occasion.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      }
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HTH9608DCF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-HTH9608DCF', {
        send_page_view: false,
        cookie_flags: 'SameSite=None;Secure',
        custom_map: {
          dimension1: 'gender',
          dimension2: 'occasion',
          dimension3: 'age_group',
          dimension4: 'budget_bucket',
          dimension5: 'accessories',
          dimension6: 'platform',
          dimension7: 'outfit_name',
          metric1:    'outfit_price',
          metric2:    'api_latency_ms'
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
